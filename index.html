<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitsApp</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <main class="app">
        <h1 class="appTitle">Habit Tracker Pro</h1>
        <p class="titleText">Small habits. Big changes</p>
        <div class="addForm">
            <input type="text" id="input">
            <button id="addButton">Add</button>
        </div>
        <div class="filters">
            <button id="allBtn">All habits</button>
            <button id="activeBtn">Active habits</button>
            <button id="completedBtn">Completed habits</button>
        </div>

        <button id="clearBtn">Clear completed</button>

        <ul id="habitsList"></ul>
        <div class="stats">
            <p id="countHabits"></p>
            <p id="doneHabits"></p>
        </div>


        <div class="progress">
            <div id="progressBar">
                <div id="progressFill"></div>
            </div>

            <p id="progressText"></p>
        </div>
    </main>






    <script src="/script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitsApp</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <input type="text" id="input">
    <button id="addButton">Add Habit</button>
    <button id="allBtn">All habits</button>
    <button id="activeBtn">Active habits</button>
    <button id="completedBtn">Completed habits</button>
    <button id="clearBtn">Clear completed</button>
    <ul id="habitsList"></ul>
    <p id="countHabits"></p>
    <p id="doneHabits"></p>

    <div id="progressBar">
        <div id="progressFill"></div>
    </div>

    <p id="progressText"></p>





    <script src="/script.js"></script>
</body>

</html>

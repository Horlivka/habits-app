<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitsApp</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <main class="app">
        <h1 class="appTitle">Habit Tracker Pro</h1>
        <p class="titleText">Build better habits every day.</p>
        <div class="addForm">
            <input type="text" id="input">
            <select id="categoryList">
                <option value="health">Health</option>
                <option value="learning">Learning</option>
                <option value="work">Work</option>
                <option value="home">Home</option>
                <option value="personal">Personal</option>
            </select>
            <button id="addButton">Add</button>
        </div>




        <div class="filters">
            <button id="allBtn">All habits</button>
            <button id="activeBtn">Active habits</button>
            <button id="completedBtn">Completed today</button>
        </div>

        <ul id="habitsList"></ul>

        <div class="stats">
            <p id="countHabits"></p>
            <p id="doneHabits"></p>
        </div>

        <section class="statistics">
            <h2>Statistics</h2>

            <div class="statCard">
                <p>Total completions</p>
                <span id="totalCompletions"></span>
            </div>
            
        </section>


        <div class="progress">
            <div id="progressBar">
                <div id="progressFill"></div>
            </div>

            <p id="progressText"></p>
        </div>
    </main>






    <script src="/script.js"></script>
</body>

</html>
